services:
  # --- PostgreSQL Veritabanı ---
  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-qr_saas_db}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Flask Uygulaması ---
  web:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-qr_saas_db}
      SECRET_KEY: ${SECRET_KEY}
      FLASK_DEBUG: "0"
      ADMIN_URL_PREFIX: ${ADMIN_URL_PREFIX:-px7k2m9-iyb}
      YONETICI_PIN: ${YONETICI_PIN:-1234}
      MUTFAK_PIN: ${MUTFAK_PIN:-5678}
      KASA_PIN: ${KASA_PIN:-9999}
      TELEGRAM_ENABLED: ${TELEGRAM_ENABLED:-True}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      MENU_SESSION_TIMEOUT: ${MENU_SESSION_TIMEOUT:-300}
    volumes:
      - uploads_data:/app/app/static/uploads
    ports:
      - "5000:5000"

volumes:
  db_data:
  uploads_data: